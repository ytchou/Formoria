<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formoria Card — Text</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 1080px;
      height: 1350px;
      overflow: hidden;
      margin: 0;
      position: relative;
      background-color: #1C1C1C;
      font-family: 'Noto Sans TC', system-ui, -apple-system, sans-serif;
    }

    /* Layer 1: Background image */
    .bg {
      position: absolute;
      inset: 0;
      width: 1080px;
      height: 1350px;
      object-fit: cover;
      display: block;
    }
    .bg:not([src]), .bg[src=""] { display: none; }

    /* Layer 2: Scrim overlay */
    .scrim {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.47) 35%, rgba(0,0,0,0.85) 100%);
      pointer-events: none;
    }

    /* Layer 3: Left accent bar */
    .bar {
      position: absolute;
      left: 0;
      top: 0;
      width: 6px;
      height: 1350px;
      background: #C4693B;
    }

    /* Layer 4: Content frame */
    .frame {
      position: absolute;
      inset: 0;
      padding: 72px 80px 0 80px;
      display: flex;
      flex-direction: column;
      color: #FFFDF8;
      font-family: 'Noto Sans TC', system-ui, -apple-system, sans-serif;
    }

    /* Wordmark row */
    .wordmark-row {
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      align-items: baseline;
      flex-shrink: 0;
    }

    .wordmark-zh {
      font-family: 'Noto Sans TC', system-ui, -apple-system, sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: #FFFDF8;
      line-height: 1;
    }

    .wordmark-en {
      font-family: 'Noto Sans TC', system-ui, -apple-system, sans-serif;
      font-size: 16px;
      font-weight: 400;
      color: #FFFDF8;
      opacity: 0.67;
      line-height: 1;
    }

    /* Spacer — pushes bottom block to bottom */
    .spacer {
      flex-grow: 1;
    }

    /* Bottom content block */
    .bottom-block {
      flex-shrink: 0;
      margin-bottom: 88px;
    }

    /* Tag pill */
    .tag {
      display: inline-flex;
      align-self: flex-start;
      padding: 8px 16px;
      border: 1.5px solid #C4693B;
      color: #C4693B;
      border-radius: 999px;
      font-size: 18px;
      font-weight: 500;
      margin-bottom: 28px;
    }

    .tag:empty {
      display: none;
    }

    /* Headline */
    .headline {
      font-family: 'Noto Sans TC', system-ui, -apple-system, sans-serif;
      font-size: 52px;
      font-weight: 700;
      line-height: 1.22;
      max-width: 920px;
      color: #FFFDF8;
      margin-bottom: 36px;
    }

    /* Decorative rule */
    .rule {
      width: 40px;
      height: 3px;
      background: #C4693B;
      margin-bottom: 28px;
    }

    /* Body content */
    .body {
      color: #FFFDF8;
      opacity: 0.85;
    }

    /* Quote mark — hidden by default, shown in quote mode */
    .quote-mark {
      display: none;
      font-family: 'Noto Sans TC', system-ui, -apple-system, sans-serif;
      font-size: 64px;
      font-weight: 700;
      color: #C4693B;
      line-height: 1;
      margin-bottom: 8px;
    }

    /* ── Mode: bullets ── */
    .mode-bullets .body ul {
      list-style: none;
    }

    .mode-bullets .body ul li {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      font-size: 22px;
      font-weight: 400;
      line-height: 1.5;
      margin-bottom: 16px;
    }

    .mode-bullets .body ul li::before {
      content: '';
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #C4693B;
      flex-shrink: 0;
      margin-top: 8px;
    }

    /* ── Mode: prose ── */
    .mode-prose .body {
      font-size: 24px;
      line-height: 1.7;
    }

    /* ── Mode: numbered ── */
    .mode-numbered .body ol {
      list-style: none;
      counter-reset: item;
    }

    .mode-numbered .body ol li {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      font-size: 22px;
      font-weight: 400;
      line-height: 1.5;
      margin-bottom: 16px;
      counter-increment: item;
    }

    .mode-numbered .body ol li::before {
      content: counter(item);
      display: inline-block;
      color: #C4693B;
      font-weight: 700;
      font-size: 22px;
      line-height: 1.5;
      flex-shrink: 0;
      min-width: 24px;
    }

    /* ── Mode: quote ── */
    .mode-quote .quote-mark {
      display: block;
    }

    .mode-quote .body {
      font-size: 26px;
      line-height: 1.7;
      font-weight: 400;
    }

    .mode-quote .body .attr {
      font-size: 18px;
      font-weight: 400;
      color: #FFFDF8;
      opacity: 0.60;
      margin-top: 20px;
    }

    /* ── Mode: big-statement ── */
    .mode-big-statement .headline {
      font-size: 62px;
      line-height: 1.2;
    }

    /* ── Mode: keyword ── */
    .mode-keyword .headline {
      font-size: 58px;
    }

    /* Layer 5: Bottom strip */
    .strip {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 1080px;
      height: 32px;
      background: #000000CC;
      display: flex;
      align-items: center;
    }

    .strip-footer {
      position: absolute;
      left: 80px;
      font-size: 13px;
      font-weight: 400;
      color: #FFFDF8;
      opacity: 0.8;
      white-space: nowrap;
    }

    .strip-counter {
      position: absolute;
      right: 80px;
      font-size: 13px;
      font-weight: 400;
      color: #C4693B;
      white-space: nowrap;
    }
  </style>
</head>
<body>

  <!-- Layer 1: Background image -->
  <img class="bg" src="" alt="">

  <!-- Layer 2: Scrim -->
  <div class="scrim"></div>

  <!-- Layer 3: Left accent bar -->
  <div class="bar"></div>

  <!-- Layer 4: Content frame -->
  <div class="frame">
    <div class="wordmark-row">
      <span class="wordmark-zh">島藏</span>
      <span class="wordmark-en">Formoria</span>
    </div>

    <div class="spacer"></div>

    <div class="mode-keyword bottom-block">
      <span class="tag">怎麼用</span>

      <h2 class="headline">從你關心的開始逛</h2>

      <div class="rule"></div>

      <div class="quote-mark">「</div>

      <div class="body">依品類、產地與工藝探索 — 食品、家居、服飾、保養⋯⋯ 找到屬於你的台灣製造。</div>
    </div>
  </div>

  <!-- Layer 5: Bottom strip -->
  <div class="strip">
    <span class="strip-footer">島藏 Formoria</span>
    <span class="strip-counter">06 / 08</span>
  </div>

</body>
</html>
