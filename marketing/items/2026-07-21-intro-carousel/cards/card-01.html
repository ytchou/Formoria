<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formoria Card — Cover</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 1080px;
      height: 1350px;
      overflow: hidden;
      margin: 0;
      position: relative;
      background-color: #1C1C1C;
      font-family: 'Noto Sans TC', system-ui, -apple-system, sans-serif;
    }

    /* Layer 1: Background image */
    .bg {
      position: absolute;
      inset: 0;
      width: 1080px;
      height: 1350px;
      object-fit: cover;
      display: block;
    }
    .bg:not([src]), .bg[src=""] { display: none; }

    /* Layer 2: Scrim overlay */
    .scrim {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(0,0,0,0.4) 30%, rgba(0,0,0,0.8) 100%);
      pointer-events: none;
    }

    /* Layer 3: Left accent bar */
    .bar {
      position: absolute;
      left: 0;
      top: 0;
      width: 6px;
      height: 1350px;
      background: #C4693B;
    }

    /* Layer 4: Content frame */
    .frame {
      position: absolute;
      inset: 0;
      padding: 72px 80px 0 80px;
      display: flex;
      flex-direction: column;
      color: #FFFDF8;
      font-family: 'Noto Sans TC', system-ui, -apple-system, sans-serif;
    }

    /* Wordmark row */
    .wordmark-row {
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      align-items: baseline;
      flex-shrink: 0;
    }

    .wordmark-zh {
      font-family: 'Noto Sans TC', system-ui, -apple-system, sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: #FFFDF8;
      line-height: 1;
    }

    .wordmark-en {
      font-family: 'Noto Sans TC', system-ui, -apple-system, sans-serif;
      font-size: 16px;
      font-weight: 400;
      color: #FFFDF8;
      opacity: 0.67;
      line-height: 1;
    }

    /* Spacer — pushes bottom block to bottom */
    .spacer {
      flex-grow: 1;
    }

    /* Bottom content block */
    .bottom-block {
      flex-shrink: 0;
      margin-bottom: 88px;
    }

    .headline {
      font-family: 'Noto Sans TC', system-ui, -apple-system, sans-serif;
      font-size: 62px;
      font-weight: 700;
      line-height: 1.2;
      max-width: 920px;
      color: #FFFDF8;
      margin-bottom: 20px;
    }

    .subhead {
      font-size: 24px;
      font-weight: 400;
      line-height: 1.7;
      max-width: 860px;
      color: #FFFDF8;
      opacity: 0.80;
      margin-bottom: 28px;
    }

    /* Layer 5: Bottom strip */
    .strip {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 1080px;
      height: 32px;
      background: #000000CC;
      display: flex;
      align-items: center;
    }

    .strip-footer {
      position: absolute;
      left: 80px;
      font-size: 13px;
      font-weight: 400;
      color: #FFFDF8;
      opacity: 0.8;
      white-space: nowrap;
    }

    .strip-counter {
      position: absolute;
      right: 80px;
      font-size: 13px;
      font-weight: 400;
      color: #C4693B;
      white-space: nowrap;
    }
  </style>
</head>
<body>

  <!-- Layer 1: Background image -->
  <img class="bg" src="" alt="">

  <!-- Layer 2: Scrim -->
  <div class="scrim"></div>

  <!-- Layer 3: Left accent bar -->
  <div class="bar"></div>

  <!-- Layer 4: Content frame -->
  <div class="frame">
    <div class="wordmark-row">
      <span class="wordmark-zh">島藏</span>
      <span class="wordmark-en">Formoria</span>
    </div>

    <div class="spacer"></div>

    <div class="bottom-block">
      <h1 class="headline">台灣製造，值得被收藏</h1>
      <p class="subhead">社群共同策展的台灣製造品牌指南</p>
    </div>
  </div>

  <!-- Layer 5: Bottom strip -->
  <div class="strip">
    <span class="strip-footer">formoria.com</span>
    <span class="strip-counter">01 / 08</span>
  </div>

</body>
</html>
