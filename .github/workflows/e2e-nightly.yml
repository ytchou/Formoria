name: E2E Nightly (Deep)

on:
  schedule:
    - cron: "10 22 * * *" # 06:10 Asia/Taipei daily
  workflow_dispatch:
    inputs:
      selfheal_only:
        description: "Skip nightly tests, run selfheal from a previous run"
        type: boolean
        default: false
      source_run_id:
        description: "Source run ID for selfheal (required when selfheal_only)"
        type: string
        default: ""
      dry_run:
        description: "Selfheal: create PR but do not auto-merge"
        type: boolean
        default: true

concurrency:
  group: e2e-nightly
  cancel-in-progress: false

jobs:
  e2e-deep:
    if: inputs.selfheal_only != true
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      issues: write
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      CHALLENGE_SECRET: ${{ secrets.CHALLENGE_SECRET }}
      ADMIN_EMAILS: ${{ secrets.ADMIN_EMAILS }}
      E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
      E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
      E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
      E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: 1x00000000000000000000AA
      TURNSTILE_SECRET_KEY: 1x0000000000000000000000000000000AA
      PLAYWRIGHT_TEST: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('src/**/*.ts', 'src/**/*.tsx', 'src/**/*.js', 'src/**/*.jsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-
            ${{ runner.os }}-nextjs-
      - name: Build Next.js (production)
        run: pnpm build
      - run: npx playwright install --with-deps chromium
      - name: Run deep Playwright tests
        env:
          PLAYWRIGHT_JSON_OUTPUT_NAME: playwright-results.json
        run: pnpm exec playwright test --project=deep --reporter=html,json
      - uses: actions/upload-artifact@v4
        if: ${{ failure() }}
        with:
          name: playwright-report-nightly
          path: |
            playwright-report/
            playwright-results.json
          retention-days: 7
      - name: Report E2E results to Agent Hub
        if: ${{ always() }}
        env:
          AGENT_HUB_INGEST_URL: ${{ secrets.AGENT_HUB_INGEST_URL }}
          AGENT_HUB_INGEST_TOKEN: ${{ secrets.AGENT_HUB_INGEST_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          JOB_STATUS: ${{ job.status }}
        run: |
          case "$JOB_STATUS" in
            success) agent_hub_status=success ;;
            failure) agent_hub_status=failed ;;
            cancelled|skipped) agent_hub_status=skipped ;;
            *) agent_hub_status=failed ;;
          esac

          workflow_started_at=$(curl -fsSL \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" | \
            jq -r '.run_started_at')
          report_date=$(TZ=Asia/Taipei date -d "$workflow_started_at" +%F)
          results_file="playwright-results.json"
          if [ -f "$results_file" ]; then
            total_specs=$(jq '(.stats.expected // 0) + (.stats.unexpected // 0) + (.stats.skipped // 0) + (.stats.flaky // 0)' "$results_file")
            passed=$(jq '(.stats.expected // 0) + (.stats.flaky // 0)' "$results_file")
            failed=$(jq '.stats.unexpected // 0' "$results_file")
            skipped=$(jq '.stats.skipped // 0' "$results_file")
            duration_seconds=$(jq '((.stats.duration // 0) / 1000) | round' "$results_file")
            failed_specs=$(jq -c '[.suites[]? | recurse(.suites[]?) as $suite | $suite.specs[]? | select(.ok == false) | {file: ($suite.file // null), title}]' "$results_file")
          else
            echo "Playwright JSON results were not generated; reporting zero collected specs."
            total_specs=0
            passed=0
            failed=0
            skipped=0
            duration_seconds=0
            failed_specs='[]'
          fi

          verdict_text="E2E: $JOB_STATUS -- $passed specs passed, $failed failed"
          payload=$(jq -n \
            --arg source_run_id "github-actions:$GITHUB_RUN_ID:$GITHUB_RUN_ATTEMPT" \
            --arg routine "e2e-nightly" \
            --arg project "formoria" \
            --arg status "$agent_hub_status" \
            --arg run_at "$workflow_started_at" \
            --arg date "$report_date" \
            --arg verdict_severity "$([ "$agent_hub_status" = success ] && echo ok || echo critical)" \
            --arg verdict_text "$verdict_text" \
            --argjson total_specs "$total_specs" \
            --argjson passed "$passed" \
            --argjson failed "$failed" \
            --argjson skipped "$skipped" \
            --argjson duration_seconds "$duration_seconds" \
            --argjson failed_specs "$failed_specs" \
            --arg workflow_url "$WORKFLOW_URL" \
            '{
              version: 1,
              source: "github_actions",
              source_run_id: $source_run_id,
              routine: $routine,
              project: $project,
              status: $status,
              run_at: $run_at,
              date: $date,
              verdict_severity: $verdict_severity,
              verdict_text: $verdict_text,
              tickets_created: [],
              log_url: $workflow_url,
              data: {
                total_specs: $total_specs,
                passed: $passed,
                failed: $failed,
                skipped: $skipped,
                duration_seconds: $duration_seconds,
                failed_specs: $failed_specs,
                workflow_url: $workflow_url
              }
            }')
          printf '%s' "$payload" > /tmp/formoria-e2e-nightly.json
          node scripts/agent-hub/report-run.mjs --file /tmp/formoria-e2e-nightly.json
      - uses: actions/github-script@v7
        if: ${{ failure() }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            try {
              const owner = context.repo.owner;
              const repo = context.repo.repo;
              const labelName = 'e2e-nightly';
              const issueTitle = 'Nightly e2e failing';
              const runUrl = '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}';
              const date = new Date().toISOString();

              try {
                await github.rest.issues.getLabel({
                  owner,
                  repo,
                  name: labelName,
                });
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }

                try {
                  await github.rest.issues.createLabel({
                    owner,
                    repo,
                    name: labelName,
                    color: 'd73a4a',
                    description: 'Nightly deep Playwright e2e failures',
                  });
                } catch (createError) {
                  if (createError.status !== 422 || createError.errors?.[0]?.code !== 'already_exists') {
                    throw createError;
                  }
                }
              }

              const { data: openIssues } = await github.rest.issues.listForRepo({
                owner,
                repo,
                state: 'open',
                labels: labelName,
              });

              const body = `Nightly deep Playwright run failed on ${date}.\n\nFailed run: ${runUrl}`;

              if (openIssues.length > 0) {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: openIssues[0].number,
                  body,
                });
              } else {
                await github.rest.issues.create({
                  owner,
                  repo,
                  title: issueTitle,
                  labels: [labelName],
                  body,
                });
              }
            } catch (error) {
              const message = error instanceof Error ? error.message : String(error);
              core.warning(`Unable to create or update nightly e2e alert issue: ${message}`);
              console.log(error);
            }

  selfheal:
    needs: [e2e-deep]
    if: >-
      always() &&
      (needs.e2e-deep.result == 'failure' ||
       (github.event_name == 'workflow_dispatch' && inputs.selfheal_only == true))
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      actions: read
      contents: read
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      CHALLENGE_SECRET: ${{ secrets.CHALLENGE_SECRET }}
      ADMIN_EMAILS: ${{ secrets.ADMIN_EMAILS }}
      E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
      E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
      E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
      E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: 1x00000000000000000000AA
      TURNSTILE_SECRET_KEY: 1x0000000000000000000000000000000AA
      PLAYWRIGHT_TEST: "true"

    steps:
      - name: Guard
        id: guard
        env:
          GH_TOKEN: ${{ secrets.SELFHEAL_PAT }}
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.selfheal_only }}" == "true" && -z "${{ inputs.source_run_id }}" ]]; then
            echo "::error::source_run_id is required when selfheal_only is true"
            exit 1
          fi
          if [[ "${{ vars.SELFHEAL_ENABLED }}" != "true" && "${{ github.event_name }}" != "workflow_dispatch" ]]; then
            echo "SELFHEAL_ENABLED is not true, skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          BRANCH_DATE=$(date +%F)
          if gh api "repos/${{ github.repository }}/git/ref/heads/selfheal/e2e-${BRANCH_DATE}" &>/dev/null; then
            echo "Branch selfheal/e2e-${BRANCH_DATE} already exists, skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if gh pr list --state open --label selfheal --json number --jq length | grep -qv '^0$'; then
            echo "Open selfheal PR exists, skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

      - name: Download nightly report (same run)
        if: steps.guard.outputs.skip != 'true' && inputs.selfheal_only != true
        uses: actions/download-artifact@v4
        with:
          name: playwright-report-nightly
          path: /tmp/playwright-report
        continue-on-error: true

      - name: Download nightly report (cross run)
        if: steps.guard.outputs.skip != 'true' && inputs.selfheal_only == true
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run download "${{ inputs.source_run_id }}" -n playwright-report-nightly -D /tmp/playwright-report || true

      - name: Checkout
        if: steps.guard.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SELFHEAL_PAT }}
          fetch-depth: 0

      - name: Context
        if: steps.guard.outputs.skip != 'true'
        id: context
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -f /tmp/playwright-report/playwright-results.json ]; then
            FAILED_SPECS=$(jq -c '[.suites[]? | recurse(.suites[]?) as $suite | $suite.specs[]? | select(.ok == false) | {file: ($suite.file // null), title}]' /tmp/playwright-report/playwright-results.json)
          else
            FAILED_SPECS='[]'
          fi
          echo "failed_specs=$FAILED_SPECS" >> "$GITHUB_OUTPUT"

          TOTAL_SPECS=$(echo "$FAILED_SPECS" | jq length)
          SUITE_SIZE=$(jq '(.stats.expected // 0) + (.stats.unexpected // 0) + (.stats.skipped // 0) + (.stats.flaky // 0)' /tmp/playwright-report/playwright-results.json 2>/dev/null || echo 100)
          SYSTEMIC=$(( TOTAL_SPECS * 100 / (SUITE_SIZE > 0 ? SUITE_SIZE : 1) > 25 ? 1 : 0 ))
          echo "systemic=$SYSTEMIC" >> "$GITHUB_OUTPUT"

          LAST_GREEN_SHA=$(gh api "repos/$GITHUB_REPOSITORY/actions/workflows/e2e-nightly.yml/runs?status=success&per_page=1" --jq '.workflow_runs[0].head_sha' || echo "")
          if [ -n "$LAST_GREEN_SHA" ]; then
            REGRESSION_DIFF=$(git log "$LAST_GREEN_SHA..HEAD" --oneline --stat 2>/dev/null | head -200 || echo "No diff available")
          else
            REGRESSION_DIFF="No previous green run found"
          fi
          echo "regression_diff<<EOF" >> "$GITHUB_OUTPUT"
          echo "$REGRESSION_DIFF" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          REPEAT_OFFENDERS=$(gh pr list --state merged --label selfheal --search "merged:>=$(date -d '-7 days' +%F 2>/dev/null || date -v-7d +%F)" --json files --jq '[.[].files[].path] | unique' 2>/dev/null || echo '[]')
          echo "repeat_offenders=$REPEAT_OFFENDERS" >> "$GITHUB_OUTPUT"

      - name: Create branch
        if: steps.guard.outputs.skip != 'true'
        id: branch
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          BRANCH="selfheal/e2e-$(date +%F)"
          git checkout -b "$BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Triage and fix
        if: steps.guard.outputs.skip != 'true'
        id: fix
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.SELFHEAL_PAT }}
          prompt: |
            Read .github/selfheal/triage-fix.md for your full instructions.

            Here are the inputs:

            failed_specs: ${{ steps.context.outputs.failed_specs }}

            regression_commits:
            ${{ steps.context.outputs.regression_diff }}

            repeat_offenders: ${{ steps.context.outputs.repeat_offenders }}

            systemic: ${{ steps.context.outputs.systemic == '1' && 'true' || 'false' }}
          claude_args: "--max-turns 60"

      - name: Review fix
        if: steps.guard.outputs.skip != 'true' && steps.fix.outcome == 'success'
        id: review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.SELFHEAL_PAT }}
          prompt: |
            Read .github/selfheal/review.md for your full instructions.
            Review the changes on this branch against the classification output.
          claude_args: "--max-turns 20"

      - name: Setup pnpm
        if: steps.guard.outputs.skip != 'true' && steps.review.outcome == 'success'
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        if: steps.guard.outputs.skip != 'true' && steps.review.outcome == 'success'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        if: steps.guard.outputs.skip != 'true' && steps.review.outcome == 'success'
        run: pnpm install --frozen-lockfile

      - name: Restore Next.js build cache
        if: steps.guard.outputs.skip != 'true' && steps.review.outcome == 'success'
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('src/**/*.ts', 'src/**/*.tsx', 'src/**/*.js', 'src/**/*.jsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-
            ${{ runner.os }}-nextjs-

      - name: Build Next.js (production)
        if: steps.guard.outputs.skip != 'true' && steps.review.outcome == 'success'
        run: pnpm build

      - name: Install Playwright browsers
        if: steps.guard.outputs.skip != 'true' && steps.review.outcome == 'success'
        run: npx playwright install --with-deps chromium

      - name: Validate fix
        if: steps.guard.outputs.skip != 'true' && steps.review.outcome == 'success'
        env:
          PLAYWRIGHT_JSON_OUTPUT_NAME: playwright-results-validation.json
          FAILED_SPECS_JSON: ${{ steps.context.outputs.failed_specs }}
        run: |
          FAILED_FILES=$(echo "$FAILED_SPECS_JSON" | jq -r '.[].file // empty' | sort -u | tr '\n' ' ')
          if [ -n "$FAILED_FILES" ]; then
            pnpm exec playwright test $FAILED_FILES --project=deep --reporter=json || true
          fi
          pnpm exec playwright test --project=deep --reporter=html,json

      - name: Push and create PR
        if: steps.guard.outputs.skip != 'true' && steps.review.outcome == 'success'
        id: merge
        env:
          GH_TOKEN: ${{ secrets.SELFHEAL_PAT }}
          FIX_RESULT: ${{ steps.fix.outputs.result }}
          FAILED_SPECS_JSON: ${{ steps.context.outputs.failed_specs }}
        run: |
          git push origin "${{ steps.branch.outputs.branch }}" --force-with-lease

          CLASSIFICATION=$(echo "$FIX_RESULT" | jq -r '.classification // empty' 2>/dev/null || echo "See fix step output")

          PR_URL=$(gh pr create \
            --title "fix(e2e): self-heal $(date +%F)" \
            --label selfheal \
            --body "## Self-Heal Fix

          Classification: $CLASSIFICATION

          Triggered by nightly run failure.

          **Failed specs:** $FAILED_SPECS_JSON

          ---
          Auto-generated by e2e-selfheal workflow." \
            --head "${{ steps.branch.outputs.branch }}")
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"

          DRY_RUN="false"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.dry_run }}" == "true" ]]; then
            DRY_RUN="true"
          fi

          if [[ "$DRY_RUN" != "true" ]]; then
            gh pr merge --auto --squash "$PR_URL"
            echo "merged=true" >> "$GITHUB_OUTPUT"
          else
            echo "merged=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Report to Agent Hub
        if: always() && steps.guard.outputs.skip != 'true'
        env:
          AGENT_HUB_INGEST_URL: ${{ secrets.AGENT_HUB_INGEST_URL }}
          AGENT_HUB_INGEST_TOKEN: ${{ secrets.AGENT_HUB_INGEST_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FAILED_SPECS_FOR_REPORT: ${{ steps.context.outputs.failed_specs || '[]' }}
          PR_URL_FOR_REPORT: ${{ steps.merge.outputs.pr_url || '' }}
          MERGED_FOR_REPORT: ${{ steps.merge.outputs.merged || 'false' }}
        run: |
          if [[ "${{ steps.guard.outputs.skip }}" == "true" ]]; then
            STATUS="skipped"
            SEVERITY="critical"
            VERDICT="Self-heal skipped: guard condition not met"
          elif [[ "${{ steps.review.outcome }}" == "failure" ]]; then
            STATUS="failed"
            SEVERITY="critical"
            VERDICT="Self-heal blocked: review rejected the fix"
          elif [[ "${{ job.status }}" == "success" ]]; then
            APP_FILES=$(git diff --name-only HEAD~1 2>/dev/null | grep -v '^e2e/' | grep -v '^\.github/' || echo "")
            if [ -n "$APP_FILES" ]; then
              STATUS="success"
              SEVERITY="warning"
              VERDICT="Self-heal applied with app code changes: $APP_FILES"
            else
              STATUS="success"
              SEVERITY="ok"
              VERDICT="Self-heal applied (test-only changes)"
            fi
          else
            STATUS="failed"
            SEVERITY="critical"
            VERDICT="Self-heal failed: ${{ job.status }}"
          fi

          VALIDATION_FILE="playwright-results-validation.json"
          if [ -f "$VALIDATION_FILE" ]; then
            VAL_PASSED=$(jq '(.stats.expected // 0) + (.stats.flaky // 0)' "$VALIDATION_FILE")
            VAL_FAILED=$(jq '.stats.unexpected // 0' "$VALIDATION_FILE")
          else
            VAL_PASSED=0
            VAL_FAILED=0
          fi

          workflow_started_at=$(curl -fsSL \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" | \
            jq -r '.run_started_at')

          WORKFLOW_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          REPORT_DATE=$(TZ=Asia/Taipei date -d "$workflow_started_at" +%F)
          RUN_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          payload=$(jq -n \
            --arg source_run_id "github-actions:${{ github.run_id }}:${{ github.run_attempt }}" \
            --arg routine "e2e-selfheal" \
            --arg project "formoria" \
            --arg status "$STATUS" \
            --arg run_at "$RUN_AT" \
            --arg date "$REPORT_DATE" \
            --arg verdict_severity "$SEVERITY" \
            --arg verdict_text "$VERDICT" \
            --argjson failed_specs "${FAILED_SPECS_FOR_REPORT:-[]}" \
            --arg pr_url "${PR_URL_FOR_REPORT}" \
            --arg merged "${MERGED_FOR_REPORT:-false}" \
            --argjson val_passed "$VAL_PASSED" \
            --argjson val_failed "$VAL_FAILED" \
            --arg workflow_url "$WORKFLOW_URL" \
            '{
              version: 1,
              source: "github_actions",
              source_run_id: $source_run_id,
              routine: $routine,
              project: $project,
              status: $status,
              run_at: $run_at,
              date: $date,
              verdict_severity: $verdict_severity,
              verdict_text: $verdict_text,
              tickets_created: [],
              log_url: $workflow_url,
              data: {
                failed_specs: $failed_specs,
                pr_url: $pr_url,
                merged: ($merged == "true"),
                validation: { passed: $val_passed, failed: $val_failed },
                workflow_url: $workflow_url
              }
            }')
          printf '%s' "$payload" > /tmp/formoria-e2e-selfheal.json
          node scripts/agent-hub/report-run.mjs --file /tmp/formoria-e2e-selfheal.json
