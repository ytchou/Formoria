name: E2E Nightly (Deep)

on:
  schedule:
    - cron: "10 22 * * *" # 06:10 Asia/Taipei daily
  workflow_dispatch:
    inputs:
      selfheal_only:
        description: "Skip nightly tests, run selfheal from a previous run"
        type: boolean
        default: false
      source_run_id:
        description: "Source run ID for selfheal (required when selfheal_only)"
        type: string
        default: ""
      source_artifact_name:
        description: "Artifact name containing the previous round's Playwright report"
        type: string
        default: "playwright-report-nightly"
      repair_branch:
        description: "Existing selfheal branch to continue repairing"
        type: string
        default: ""
      e2e_grep:
        description: "Optional Playwright grep regex for a small manual run"
        type: string
        default: ""
      dry_run:
        description: "Selfheal: create PR but do not auto-merge"
        type: boolean
        default: false

concurrency:
  group: formoria-agent-writer
  cancel-in-progress: false

jobs:
  e2e-deep:
    if: inputs.selfheal_only != true
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      issues: write
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      CHALLENGE_SECRET: ${{ secrets.CHALLENGE_SECRET }}
      ADMIN_EMAILS: ${{ secrets.ADMIN_EMAILS }}
      E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
      E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
      E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
      E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: 1x00000000000000000000AA
      TURNSTILE_SECRET_KEY: 1x0000000000000000000000000000000AA
      PLAYWRIGHT_TEST: "true"
      E2E_GREP: ${{ inputs.e2e_grep }}
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        id: checkout
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        id: setup_pnpm
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        id: setup_node
        with:
          node-version: 22
          cache: "pnpm"
      - name: Install dependencies
        id: install
        run: pnpm install --frozen-lockfile
      - name: Restore Next.js build cache
        id: cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('src/**/*.ts', 'src/**/*.tsx', 'src/**/*.js', 'src/**/*.jsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-
            ${{ runner.os }}-nextjs-
      - name: Build Next.js (production)
        id: build
        run: |
          set -o pipefail
          pnpm build 2>&1 | tee "$RUNNER_TEMP/formoria-build.log"
      - name: Install Playwright browsers
        id: browsers
        run: npx playwright install chromium
      - name: Run deep Playwright tests
        id: e2e
        env:
          PLAYWRIGHT_JSON_OUTPUT_NAME: playwright-results.json
        run: |
          TEST_ARGS=(--project=deep --reporter=html,json)
          if [ -n "$E2E_GREP" ]; then
            TEST_ARGS+=(--grep "$E2E_GREP")
          fi
          pnpm exec playwright test "${TEST_ARGS[@]}"
      - name: Prepare nightly failure report
        if: >-
          always() &&
          (
            steps.checkout.outcome == 'failure' ||
            steps.setup_pnpm.outcome == 'failure' ||
            steps.setup_node.outcome == 'failure' ||
            steps.install.outcome == 'failure' ||
            steps.cache.outcome == 'failure' ||
            steps.build.outcome == 'failure' ||
            steps.browsers.outcome == 'failure' ||
            steps.e2e.outcome == 'failure'
          )
        id: nightly_report
        env:
          BUILD_OUTCOME: ${{ steps.build.outcome }}
          BROWSERS_OUTCOME: ${{ steps.browsers.outcome }}
          CHECKOUT_OUTCOME: ${{ steps.checkout.outcome }}
          E2E_OUTCOME: ${{ steps.e2e.outcome }}
          INSTALL_OUTCOME: ${{ steps.install.outcome }}
          SETUP_NODE_OUTCOME: ${{ steps.setup_node.outcome }}
          SETUP_PNPM_OUTCOME: ${{ steps.setup_pnpm.outcome }}
          WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          REPORT_DIR="$RUNNER_TEMP/formoria-nightly-report"
          rm -rf "$REPORT_DIR"
          mkdir -p "$REPORT_DIR"

          if [ -s "$RUNNER_TEMP/formoria-build.log" ]; then
            cp "$RUNNER_TEMP/formoria-build.log" "$REPORT_DIR/build.log"
          fi

          if [ -d playwright-report ]; then
            cp -R playwright-report "$REPORT_DIR/playwright-report"
          fi

          if [ -s playwright-results.json ]; then
            cp playwright-results.json "$REPORT_DIR/playwright-results.json"
          else
            FAILED_STEP="workflow setup"
            if [ "$BUILD_OUTCOME" = "failure" ]; then
              FAILED_STEP="Next.js build"
            elif [ "$E2E_OUTCOME" = "failure" ]; then
              FAILED_STEP="Playwright test execution"
            elif [ "$BROWSERS_OUTCOME" = "failure" ]; then
              FAILED_STEP="Playwright browser installation"
            elif [ "$INSTALL_OUTCOME" = "failure" ]; then
              FAILED_STEP="dependency installation"
            elif [ "$SETUP_NODE_OUTCOME" = "failure" ]; then
              FAILED_STEP="Node.js setup"
            elif [ "$SETUP_PNPM_OUTCOME" = "failure" ]; then
              FAILED_STEP="pnpm setup"
            elif [ "$CHECKOUT_OUTCOME" = "failure" ]; then
              FAILED_STEP="repository checkout"
            fi

            jq -n \
              --arg failed_step "$FAILED_STEP" \
              --arg workflow_url "$WORKFLOW_URL" \
              '{
                version: "1.0",
                suites: [{
                  title: "Workflow failure",
                  file: null,
                  specs: [{
                    title: ("\($failed_step) failed before a Playwright report was available. Inspect the source run logs: \($workflow_url)"),
                    ok: false,
                    tests: []
                  }]
                }],
                stats: {
                  duration: 0,
                  expected: 0,
                  skipped: 0,
                  unexpected: 1,
                  flaky: 0
                },
                metadata: {
                  formoria_failure: {
                    failed_step: $failed_step,
                    workflow_url: $workflow_url
                  }
                }
              }' > "$REPORT_DIR/playwright-results.json"
          fi

          echo "report_dir=$REPORT_DIR" >> "$GITHUB_OUTPUT"

      - name: Upload nightly failure report
        if: always() && steps.nightly_report.outputs.report_dir != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report-nightly
          path: ${{ steps.nightly_report.outputs.report_dir }}
          if-no-files-found: error
          retention-days: 7
      - name: Report E2E results to Agent Hub
        if: ${{ always() }}
        continue-on-error: true
        env:
          AGENT_HUB_INGEST_URL: ${{ secrets.AGENT_HUB_INGEST_URL }}
          AGENT_HUB_INGEST_TOKEN: ${{ secrets.AGENT_HUB_INGEST_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          JOB_STATUS: ${{ job.status }}
        run: |
          case "$JOB_STATUS" in
            success) agent_hub_status=success ;;
            failure) agent_hub_status=failed ;;
            cancelled|skipped) agent_hub_status=skipped ;;
            *) agent_hub_status=failed ;;
          esac

          workflow_started_at=$(curl -fsSL \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" | \
            jq -r '.run_started_at')
          report_date=$(TZ=Asia/Taipei date -d "$workflow_started_at" +%F)
          results_file="playwright-results.json"
          if [ -f "$results_file" ]; then
            total_specs=$(jq '(.stats.expected // 0) + (.stats.unexpected // 0) + (.stats.skipped // 0) + (.stats.flaky // 0)' "$results_file")
            passed=$(jq '(.stats.expected // 0) + (.stats.flaky // 0)' "$results_file")
            failed=$(jq '.stats.unexpected // 0' "$results_file")
            skipped=$(jq '.stats.skipped // 0' "$results_file")
            duration_seconds=$(jq '((.stats.duration // 0) / 1000) | round' "$results_file")
            failed_specs=$(jq -c '[.suites[]? | recurse(.suites[]?) as $suite | $suite.specs[]? | select(.ok == false) | {file: ($suite.file // null), title}]' "$results_file")
          else
            echo "Playwright JSON results were not generated; reporting zero collected specs."
            total_specs=0
            passed=0
            failed=0
            skipped=0
            duration_seconds=0
            failed_specs='[]'
          fi

          verdict_text="E2E: $JOB_STATUS -- $passed specs passed, $failed failed"
          payload=$(jq -n \
            --arg source_run_id "github-actions:$GITHUB_RUN_ID:$GITHUB_RUN_ATTEMPT" \
            --arg routine "e2e-nightly" \
            --arg project "formoria" \
            --arg status "$agent_hub_status" \
            --arg run_at "$workflow_started_at" \
            --arg date "$report_date" \
            --arg verdict_severity "$([ "$agent_hub_status" = success ] && echo ok || echo critical)" \
            --arg verdict_text "$verdict_text" \
            --argjson total_specs "$total_specs" \
            --argjson passed "$passed" \
            --argjson failed "$failed" \
            --argjson skipped "$skipped" \
            --argjson duration_seconds "$duration_seconds" \
            --argjson failed_specs "$failed_specs" \
            --arg workflow_url "$WORKFLOW_URL" \
            '{
              version: 1,
              source: "github_actions",
              source_run_id: $source_run_id,
              routine: $routine,
              project: $project,
              status: $status,
              run_at: $run_at,
              date: $date,
              verdict_severity: $verdict_severity,
              verdict_text: $verdict_text,
              tickets_created: [],
              log_url: $workflow_url,
              data: {
                phase: "test",
                total_specs: $total_specs,
                passed: $passed,
                failed: $failed,
                skipped: $skipped,
                duration_seconds: $duration_seconds,
                failed_specs: $failed_specs,
                workflow_url: $workflow_url
              }
            }')
          printf '%s' "$payload" > /tmp/formoria-e2e-nightly.json
          node scripts/agent-hub/report-run.mjs --file /tmp/formoria-e2e-nightly.json
      - name: Notify Slack of initial E2E result
        if: ${{ always() }}
        continue-on-error: true
        env:
          E2E_SLACK_PHASE: initial
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          JOB_STATUS: ${{ job.status }}
          SLACK_HEALTH_WEBHOOK_URL: ${{ secrets.SLACK_HEALTH_WEBHOOK_URL }}
          WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: pnpm exec tsx scripts/notifications/e2e-slack.ts
      - uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        if: >-
          always() &&
          (
            steps.checkout.outcome == 'failure' ||
            steps.setup_pnpm.outcome == 'failure' ||
            steps.setup_node.outcome == 'failure' ||
            steps.install.outcome == 'failure' ||
            steps.cache.outcome == 'failure' ||
            steps.build.outcome == 'failure' ||
            steps.browsers.outcome == 'failure' ||
            steps.e2e.outcome == 'failure'
          )
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            try {
              const owner = context.repo.owner;
              const repo = context.repo.repo;
              const labelName = 'e2e-nightly';
              const issueTitle = 'Nightly e2e failing';
              const runUrl = '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}';
              const date = new Date().toISOString();

              try {
                await github.rest.issues.getLabel({
                  owner,
                  repo,
                  name: labelName,
                });
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }

                try {
                  await github.rest.issues.createLabel({
                    owner,
                    repo,
                    name: labelName,
                    color: 'd73a4a',
                    description: 'Nightly deep Playwright e2e failures',
                  });
                } catch (createError) {
                  if (createError.status !== 422 || createError.errors?.[0]?.code !== 'already_exists') {
                    throw createError;
                  }
                }
              }

              const { data: openIssues } = await github.rest.issues.listForRepo({
                owner,
                repo,
                state: 'open',
                labels: labelName,
              });

              const body = `Nightly deep Playwright run failed on ${date}.\n\nFailed run: ${runUrl}`;

              if (openIssues.length > 0) {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: openIssues[0].number,
                  body,
                });
              } else {
                await github.rest.issues.create({
                  owner,
                  repo,
                  title: issueTitle,
                  labels: [labelName],
                  body,
                });
              }
            } catch (error) {
              const message = error instanceof Error ? error.message : String(error);
              core.warning(`Unable to create or update nightly e2e alert issue: ${message}`);
              console.log(error);
            }

  selfheal:
    needs: [e2e-deep]
    if: >-
      always() &&
      (needs.e2e-deep.result == 'failure' ||
       (github.event_name == 'workflow_dispatch' && inputs.selfheal_only == true))
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      actions: write
      contents: read
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      CHALLENGE_SECRET: ${{ secrets.CHALLENGE_SECRET }}
      ADMIN_EMAILS: ${{ secrets.ADMIN_EMAILS }}
      E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
      E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
      E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
      E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: 1x00000000000000000000AA
      TURNSTILE_SECRET_KEY: 1x0000000000000000000000000000000AA
      PLAYWRIGHT_TEST: "true"
      E2E_GREP: ${{ inputs.e2e_grep }}

    steps:
      - name: Guard
        id: guard
        env:
          GH_TOKEN: ${{ secrets.SELFHEAL_PAT }}
          REPAIR_BRANCH: ${{ inputs.repair_branch }}
          SELFHEAL_ENABLED: ${{ vars.SELFHEAL_ENABLED }}
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.selfheal_only }}" == "true" && -z "${{ inputs.source_run_id }}" ]]; then
            echo "::error::source_run_id is required when selfheal_only is true"
            exit 1
          fi
          if [[ "$SELFHEAL_ENABLED" != "true" ]]; then
            echo "SELFHEAL_ENABLED is not true, skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ -n "$REPAIR_BRANCH" ]]; then
            if [[ "$REPAIR_BRANCH" != selfheal/e2e-* ]]; then
              echo "::error::repair_branch must use the selfheal/e2e-* prefix"
              exit 1
            fi
            if ! gh api "repos/$GITHUB_REPOSITORY/git/ref/heads/$REPAIR_BRANCH" &>/dev/null; then
              echo "::error::repair_branch does not exist: $REPAIR_BRANCH"
              exit 1
            fi
          else
            BRANCH_DATE=$(date +%F)
            if gh api "repos/$GITHUB_REPOSITORY/git/ref/heads/selfheal/e2e-${BRANCH_DATE}" &>/dev/null; then
              echo "Branch selfheal/e2e-${BRANCH_DATE} already exists, skipping"
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          if gh pr list --repo "$GITHUB_REPOSITORY" --state open --label selfheal --json number --jq length | grep -qv '^0$'; then
            echo "Open selfheal PR exists, skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

      - name: Checkout
        if: steps.guard.outputs.skip != 'true'
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          token: ${{ secrets.SELFHEAL_PAT }}
          fetch-depth: 0
          ref: ${{ inputs.repair_branch || github.ref }}

      - name: Download nightly report (same run)
        if: always() && steps.guard.outputs.skip != 'true' && inputs.selfheal_only != true
        continue-on-error: true
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: playwright-report-nightly
          path: /tmp/playwright-report

      - name: Download nightly report (cross run)
        if: always() && steps.guard.outputs.skip != 'true' && inputs.selfheal_only == true
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run download "${{ inputs.source_run_id }}" -n "${{ inputs.source_artifact_name }}" -D /tmp/playwright-report

      - name: Prepare self-heal input
        if: always() && steps.guard.outputs.skip != 'true'
        env:
          SOURCE_RUN_ID: ${{ inputs.source_run_id || github.run_id }}
          SOURCE_WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ inputs.source_run_id || github.run_id }}
        run: |
          set -euo pipefail
          REPORT_PATH=/tmp/playwright-report/playwright-results.json
          mkdir -p "$(dirname "$REPORT_PATH")"
          if [ -s "$REPORT_PATH" ]; then
            exit 0
          fi

          jq -n \
            --arg source_run_id "$SOURCE_RUN_ID" \
            --arg workflow_url "$SOURCE_WORKFLOW_URL" \
            '{
              version: "1.0",
              suites: [{
                title: "Workflow failure",
                file: null,
                specs: [{
                  title: ("The source run did not provide a Playwright report. Inspect its workflow logs: \($workflow_url)"),
                  ok: false,
                  tests: []
                }]
              }],
              stats: {
                duration: 0,
                expected: 0,
                skipped: 0,
                unexpected: 1,
                flaky: 0
              },
              metadata: {
                formoria_failure: {
                  source_run_id: $source_run_id,
                  workflow_url: $workflow_url
                }
              }
            }' > "$REPORT_PATH"

          if [ -s "$RUNNER_TEMP/formoria-selfheal-build.log" ]; then
            cp "$RUNNER_TEMP/formoria-selfheal-build.log" "$(dirname "$REPORT_PATH")/build.log"
          fi

      - name: Context
        if: steps.guard.outputs.skip != 'true'
        id: context
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -f /tmp/playwright-report/playwright-results.json ]; then
            FAILED_SPECS=$(jq -c '[.suites[]? | recurse(.suites[]?) as $suite | $suite.specs[]? | select(.ok == false) | {file: ($suite.file // null), title}]' /tmp/playwright-report/playwright-results.json)
          else
            FAILED_SPECS='[]'
          fi
          echo "failed_specs=$FAILED_SPECS" >> "$GITHUB_OUTPUT"

          FAILURE_CONTEXT="No captured build output was available. Inspect the source workflow logs before diagnosing."
          if [ -s /tmp/playwright-report/build.log ]; then
            FAILURE_CONTEXT=$(tail -n 240 /tmp/playwright-report/build.log)
          fi
          FAILURE_CONTEXT_DELIMITER="FORMORIA_FAILURE_CONTEXT_${GITHUB_RUN_ID}_${GITHUB_RUN_ATTEMPT}"
          echo "failure_context<<$FAILURE_CONTEXT_DELIMITER" >> "$GITHUB_OUTPUT"
          printf '%s\n' "$FAILURE_CONTEXT" >> "$GITHUB_OUTPUT"
          echo "$FAILURE_CONTEXT_DELIMITER" >> "$GITHUB_OUTPUT"

          TOTAL_SPECS=$(echo "$FAILED_SPECS" | jq length)
          SUITE_SIZE=$(jq '(.stats.expected // 0) + (.stats.unexpected // 0) + (.stats.skipped // 0) + (.stats.flaky // 0)' /tmp/playwright-report/playwright-results.json 2>/dev/null || echo 100)
          SYSTEMIC=$(( TOTAL_SPECS * 100 / (SUITE_SIZE > 0 ? SUITE_SIZE : 1) > 25 ? 1 : 0 ))
          echo "systemic=$SYSTEMIC" >> "$GITHUB_OUTPUT"

          LAST_GREEN_SHA=$(gh api "repos/$GITHUB_REPOSITORY/actions/workflows/e2e-nightly.yml/runs?status=success&per_page=1" --jq '.workflow_runs[0].head_sha' || echo "")
          if [ -n "$LAST_GREEN_SHA" ]; then
            REGRESSION_DIFF=$(git log "$LAST_GREEN_SHA..HEAD" --oneline --stat 2>/dev/null | head -200 || echo "No diff available")
          else
            REGRESSION_DIFF="No previous green run found"
          fi
          echo "regression_diff<<EOF" >> "$GITHUB_OUTPUT"
          echo "$REGRESSION_DIFF" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          REPEAT_OFFENDERS=$(gh pr list --repo "$GITHUB_REPOSITORY" --state merged --label selfheal --search "merged:>=$(date -d '-7 days' +%F 2>/dev/null || date -v-7d +%F)" --json files --jq '[.[].files[].path] | unique' 2>/dev/null || echo '[]')
          echo "repeat_offenders=$REPEAT_OFFENDERS" >> "$GITHUB_OUTPUT"

      - name: Create branch
        if: steps.guard.outputs.skip != 'true'
        id: branch
        env:
          REPAIR_BRANCH: ${{ inputs.repair_branch }}
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          BRANCH="${REPAIR_BRANCH:-selfheal/e2e-$(date +%F)}"
          git checkout -B "$BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Sync repair branch with default branch
        if: steps.guard.outputs.skip != 'true'
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          git fetch origin "$DEFAULT_BRANCH" --prune
          git rebase "origin/$DEFAULT_BRANCH"

      - name: Setup pnpm
        if: steps.guard.outputs.skip != 'true'
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node.js
        if: steps.guard.outputs.skip != 'true'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        if: steps.guard.outputs.skip != 'true'
        run: pnpm install --frozen-lockfile

      - name: Restore Next.js build cache
        if: steps.guard.outputs.skip != 'true'
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('src/**/*.ts', 'src/**/*.tsx', 'src/**/*.js', 'src/**/*.jsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-
            ${{ runner.os }}-nextjs-

      - name: Install Playwright browsers
        if: steps.guard.outputs.skip != 'true'
        run: npx playwright install chromium

      - name: Triage and fix
        if: steps.guard.outputs.skip != 'true'
        id: fix
        uses: anthropics/claude-code-action@fa7e2f0a29a126f0b81cdcf360561b36e44cf608 # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.SELFHEAL_PAT }}
          allowed_bots: github-actions
          prompt: |
            Read .github/selfheal/triage-fix.md for your full instructions.

            Here are the inputs:

            failed_specs: ${{ steps.context.outputs.failed_specs }}

            failure_context:
            ${{ steps.context.outputs.failure_context }}

            source_run_id: ${{ inputs.source_run_id || github.run_id }}

            source_workflow_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ inputs.source_run_id || github.run_id }}

            regression_commits:
            ${{ steps.context.outputs.regression_diff }}

            repeat_offenders: ${{ steps.context.outputs.repeat_offenders }}

            systemic: ${{ steps.context.outputs.systemic == '1' && 'true' || 'false' }}
          claude_args: >-
            --max-turns 60
            --allowedTools "Read,Write,Edit,Replace,Glob,Grep,Bash(git status:*),Bash(git diff:*),Bash(git log:*),Bash(git show:*),Bash(git ls-files:*),Bash(git rev-parse:*),Bash(git add:*),Bash(git commit:*),Bash(pnpm:*),Bash(gh run view:*)"
            --json-schema '{"type":"object","additionalProperties":true,"required":["classification"],"properties":{"classification":{"type":"array","items":{"type":"object","additionalProperties":true,"required":["file","title","category","reason"]}}}}'

      - name: Review fix
        if: steps.guard.outputs.skip != 'true' && steps.fix.outcome == 'success'
        id: review
        uses: anthropics/claude-code-action@fa7e2f0a29a126f0b81cdcf360561b36e44cf608 # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.SELFHEAL_PAT }}
          allowed_bots: github-actions
          prompt: |
            Read .github/selfheal/review.md for your full instructions.
            Review the changes on this branch against the classification output.
            Keep this review focused on the diff and the stated criteria; do not run the full e2e suite.
            Return the required VERDICT, JUSTIFICATION, APP_FILES, and RISK lines once the diff is reviewed.
          claude_args: >-
            --max-turns 40
            --allowedTools "Read,Glob,Grep,Bash(git status:*),Bash(git diff:*),Bash(git log:*),Bash(git show:*)"

      - name: Refresh dependencies after fix
        if: steps.guard.outputs.skip != 'true' && steps.review.outcome == 'success'
        run: pnpm install --frozen-lockfile

      - name: Build Next.js after fix
        if: steps.guard.outputs.skip != 'true' && steps.review.outcome == 'success'
        id: selfheal_build
        run: |
          set -o pipefail
          pnpm build 2>&1 | tee "$RUNNER_TEMP/formoria-selfheal-build.log"

      - name: Validate fix
        if: steps.guard.outputs.skip != 'true' && steps.review.outcome == 'success'
        id: validation
        env:
          PLAYWRIGHT_JSON_OUTPUT_NAME: playwright-results-validation.json
          FAILED_SPECS_JSON: ${{ steps.context.outputs.failed_specs }}
        run: |
          TEST_ARGS=(--project=deep)
          if [ -n "$E2E_GREP" ]; then
            TEST_ARGS+=(--grep "$E2E_GREP")
          fi
          FAILED_FILES=$(echo "$FAILED_SPECS_JSON" | jq -r '.[].file // empty' | sort -u | tr '\n' ' ')
          if [ -n "$FAILED_FILES" ]; then
            pnpm exec playwright test $FAILED_FILES "${TEST_ARGS[@]}" --reporter=json
          fi
          pnpm exec playwright test "${TEST_ARGS[@]}" --reporter=html,json

      - name: Prepare self-heal report for next round
        if: >-
          always() &&
          steps.guard.outputs.skip != 'true' &&
          steps.fix.outcome == 'success' &&
          steps.review.outcome == 'success' &&
          steps.validation.outcome != 'success'
        id: next_report
        env:
          BUILD_OUTCOME: ${{ steps.selfheal_build.outcome }}
        run: |
          REPORT_DIR="$RUNNER_TEMP/formoria-selfheal-report"
          rm -rf "$REPORT_DIR"
          mkdir -p "$REPORT_DIR"

          if [ "$BUILD_OUTCOME" = "failure" ] && [ -s "$RUNNER_TEMP/formoria-selfheal-build.log" ]; then
            cp "$RUNNER_TEMP/formoria-selfheal-build.log" "$REPORT_DIR/build.log"
          fi

          if [ -s playwright-results-validation.json ]; then
            cp playwright-results-validation.json "$REPORT_DIR/playwright-results.json"
          else
            WORKFLOW_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            jq -n \
              --arg workflow_url "$WORKFLOW_URL" \
              '{
                version: "1.0",
                suites: [{
                  title: "Self-heal validation failure",
                  file: null,
                  specs: [{
                    title: ("Validation did not produce a Playwright report. Inspect the current run logs: \($workflow_url)"),
                    ok: false,
                    tests: []
                  }]
                }],
                stats: {
                  duration: 0,
                  expected: 0,
                  skipped: 0,
                  unexpected: 1,
                  flaky: 0
                },
                metadata: {
                  formoria_failure: {
                    workflow_url: $workflow_url
                  }
                }
              }' > "$REPORT_DIR/playwright-results.json"
          fi

          echo "available=true" >> "$GITHUB_OUTPUT"

      - name: Upload self-heal report for next round
        if: always() && steps.next_report.outputs.available == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report-selfheal
          path: ${{ runner.temp }}/formoria-selfheal-report
          retention-days: 7

      - name: Continue self-heal until green
        if: >-
          always() &&
          steps.guard.outputs.skip != 'true' &&
          steps.fix.outcome == 'success' &&
          steps.review.outcome == 'success' &&
          steps.validation.outcome != 'success' &&
          steps.next_report.outputs.available == 'true'
        id: continue
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          DRY_RUN: ${{ inputs.dry_run }}
          E2E_GREP: ${{ inputs.e2e_grep }}
          GH_TOKEN: ${{ secrets.SELFHEAL_PAT }}
          WORKFLOW_DISPATCH_TOKEN: ${{ github.token }}
          REPAIR_BRANCH: ${{ steps.branch.outputs.branch }}
        run: |
          set -euo pipefail
          DRY_RUN_VALUE="${DRY_RUN:-false}"
          git push origin "$REPAIR_BRANCH" --force-with-lease
          GH_TOKEN="$WORKFLOW_DISPATCH_TOKEN" gh workflow run e2e-nightly.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref "$DEFAULT_BRANCH" \
            --field selfheal_only=true \
            --field source_run_id="$GITHUB_RUN_ID" \
            --field source_artifact_name=playwright-report-selfheal \
            --field repair_branch="$REPAIR_BRANCH" \
            --field e2e_grep="$E2E_GREP" \
            --field dry_run="$DRY_RUN_VALUE"
          echo "dispatched=true" >> "$GITHUB_OUTPUT"
          echo "Validation is still red; dispatched the next self-heal round"
          exit 1

      - name: Push and create PR
        if: steps.guard.outputs.skip != 'true' && steps.review.outcome == 'success' && steps.validation.outcome == 'success'
        id: merge
        env:
          GH_TOKEN: ${{ secrets.SELFHEAL_PAT }}
          FIX_RESULT: ${{ steps.fix.outputs.structured_output }}
          FAILED_SPECS_JSON: ${{ steps.context.outputs.failed_specs }}
        run: |
          git push origin "${{ steps.branch.outputs.branch }}" --force-with-lease

          CLASSIFICATION=$(echo "$FIX_RESULT" | jq -r '.classification // empty' 2>/dev/null || echo "See fix step output")

          PR_URL=$(gh pr create \
            --title "fix(e2e): self-heal $(date +%F)" \
            --label selfheal \
            --body "## Self-Heal Fix

          Classification: $CLASSIFICATION

          Triggered by nightly run failure.

          **Failed specs:** $FAILED_SPECS_JSON

          ---
          Auto-generated by e2e-selfheal workflow." \
            --head "${{ steps.branch.outputs.branch }}")
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"

          DRY_RUN="false"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.dry_run }}" == "true" ]]; then
            DRY_RUN="true"
          fi

          if [[ "$DRY_RUN" != "true" ]]; then
            gh pr merge --auto --squash "$PR_URL"
            echo "auto_merge_enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "auto_merge_enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Notify Slack of green self-heal PR
        if: always() && steps.guard.outputs.skip != 'true' && steps.merge.outputs.pr_url != ''
        continue-on-error: true
        env:
          AUTO_MERGE_ENABLED: ${{ steps.merge.outputs.auto_merge_enabled || 'false' }}
          E2E_SLACK_PHASE: green
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          JOB_STATUS: ${{ job.status }}
          PR_URL: ${{ steps.merge.outputs.pr_url }}
          SLACK_HEALTH_WEBHOOK_URL: ${{ secrets.SLACK_HEALTH_WEBHOOK_URL }}
          WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: pnpm exec tsx scripts/notifications/e2e-slack.ts

      - name: Report to Agent Hub
        if: always() && steps.guard.outputs.skip != 'true'
        continue-on-error: true
        env:
          AGENT_HUB_INGEST_URL: ${{ secrets.AGENT_HUB_INGEST_URL }}
          AGENT_HUB_INGEST_TOKEN: ${{ secrets.AGENT_HUB_INGEST_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FAILED_SPECS_FOR_REPORT: ${{ steps.context.outputs.failed_specs || '[]' }}
          PR_URL_FOR_REPORT: ${{ steps.merge.outputs.pr_url || '' }}
          AUTO_MERGE_ENABLED_FOR_REPORT: ${{ steps.merge.outputs.auto_merge_enabled || 'false' }}
          CONTINUATION_DISPATCHED: ${{ steps.continue.outputs.dispatched || 'false' }}
        run: |
          if [[ "${{ steps.guard.outputs.skip }}" == "true" ]]; then
            STATUS="skipped"
            SEVERITY="critical"
            VERDICT="Self-heal skipped: guard condition not met"
          elif [[ "$CONTINUATION_DISPATCHED" == "true" ]]; then
            STATUS="failed"
            SEVERITY="critical"
            VERDICT="Self-heal validation remained red; the next round was dispatched"
          elif [[ "${{ steps.review.outcome }}" == "failure" ]]; then
            STATUS="failed"
            SEVERITY="critical"
            VERDICT="Self-heal blocked: review rejected the fix"
          elif [[ "${{ job.status }}" == "success" ]]; then
            APP_FILES=$(git diff --name-only HEAD~1 2>/dev/null | grep -v '^e2e/' | grep -v '^\.github/' || echo "")
            if [ -n "$APP_FILES" ]; then
              STATUS="success"
              SEVERITY="warning"
              VERDICT="Self-heal applied with app code changes: $APP_FILES"
            else
              STATUS="success"
              SEVERITY="ok"
              VERDICT="Self-heal applied (test-only changes)"
            fi
          else
            STATUS="failed"
            SEVERITY="critical"
            VERDICT="Self-heal failed: ${{ job.status }}"
          fi

          VALIDATION_FILE="playwright-results-validation.json"
          if [ -f "$VALIDATION_FILE" ]; then
            VAL_PASSED=$(jq '(.stats.expected // 0) + (.stats.flaky // 0)' "$VALIDATION_FILE")
            VAL_FAILED=$(jq '.stats.unexpected // 0' "$VALIDATION_FILE")
          else
            VAL_PASSED=0
            VAL_FAILED=0
          fi

          workflow_started_at=$(curl -fsSL \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" | \
            jq -r '.run_started_at')

          WORKFLOW_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          REPORT_DATE=$(TZ=Asia/Taipei date -d "$workflow_started_at" +%F)
          RUN_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          payload=$(jq -n \
            --arg source_run_id "github-actions:${{ github.run_id }}:${{ github.run_attempt }}" \
            --arg routine "e2e-nightly" \
            --arg project "formoria" \
            --arg status "$STATUS" \
            --arg run_at "$RUN_AT" \
            --arg date "$REPORT_DATE" \
            --arg verdict_severity "$SEVERITY" \
            --arg verdict_text "$VERDICT" \
            --argjson failed_specs "${FAILED_SPECS_FOR_REPORT:-[]}" \
            --arg pr_url "${PR_URL_FOR_REPORT}" \
            --arg auto_merge_enabled "${AUTO_MERGE_ENABLED_FOR_REPORT:-false}" \
            --argjson val_passed "$VAL_PASSED" \
            --argjson val_failed "$VAL_FAILED" \
            --arg workflow_url "$WORKFLOW_URL" \
            '{
              version: 1,
              source: "github_actions",
              source_run_id: $source_run_id,
              routine: $routine,
              project: $project,
              status: $status,
              run_at: $run_at,
              date: $date,
              verdict_severity: $verdict_severity,
              verdict_text: $verdict_text,
              tickets_created: [],
              log_url: $workflow_url,
              data: {
                phase: "selfheal",
                failed_specs: $failed_specs,
                pr_url: $pr_url,
                auto_merge_enabled: ($auto_merge_enabled == "true"),
                validation: { passed: $val_passed, failed: $val_failed },
                workflow_url: $workflow_url
              }
            }')
          printf '%s' "$payload" > /tmp/formoria-e2e-selfheal.json
          node scripts/agent-hub/report-run.mjs --file /tmp/formoria-e2e-selfheal.json
