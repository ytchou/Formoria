name: Agent Hub Relay

on:
  push:
    branches: [main]
    paths:
      - "routine-outputs/*.json"

jobs:
  relay:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4

      - name: Send to Agent Hub
        env:
          AGENT_HUB_SUPABASE_URL: ${{ secrets.AGENT_HUB_SUPABASE_URL }}
          AGENT_HUB_SERVICE_KEY: ${{ secrets.AGENT_HUB_SERVICE_KEY }}
        run: |
          sent=0
          failed=0
          for file in routine-outputs/*.json; do
            [ -f "$file" ] || continue
            basename="${file##*/}"
            echo "Sending $basename to Agent Hub"
            status=$(curl -sS -o /dev/null -w '%{http_code}' \
              -X POST "$AGENT_HUB_SUPABASE_URL/rest/v1/rpc/insert_routine_run" \
              -H "apikey: $AGENT_HUB_SERVICE_KEY" \
              -H "Authorization: Bearer $AGENT_HUB_SERVICE_KEY" \
              -H "Content-Type: application/json" \
              -d "$(jq '{
                p_routine_name: .routine,
                p_project: .project,
                p_status: .status,
                p_started_at: .run_at,
                p_report_date: .date,
                p_verdict_severity: .verdict_severity,
                p_verdict_text: .verdict_text,
                p_summary: .verdict_text,
                p_metadata: .data
              }' "$file")")
            if [ "$status" = "200" ]; then
              echo "Delivered: $file"
              rm "$file"
              sent=$((sent + 1))
            else
              echo "Failed ($status): $file"
              failed=$((failed + 1))
            fi
          done
          echo "Sent: $sent, Failed: $failed"
          [ "$failed" -eq 0 ] || exit 1

      - name: Cleanup delivered files
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add routine-outputs/
          git diff --staged --quiet && exit 0
          branch="chore/routine-output-cleanup-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$branch"
          git commit -m "chore: cleanup delivered routine outputs"
          git push origin "$branch"
          pr_url=$(gh pr create \
            --title "chore: cleanup delivered routine outputs" \
            --body "Auto-cleanup of delivered routine output files." \
            --head "$branch" --base main)
          gh pr merge "$pr_url" --squash --delete-branch
