name: IndexNow

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  submit:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Fetch sitemap
        run: |
          curl -sf https://formoria.com/sitemap.xml -o sitemap.xml

      - name: Extract URLs and submit
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: |
          URLS=$(grep -oP '(?<=<loc>)[^<]+' sitemap.xml)
          URL_ARRAY=$(echo "$URLS" | jq -R . | jq -s .)

          curl -sf -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json" \
            -d "{
              \"host\": \"formoria.com\",
              \"key\": \"${INDEXNOW_KEY}\",
              \"urlList\": ${URL_ARRAY}
            }"

          echo "Submitted $(echo "$URLS" | wc -l | tr -d ' ') URLs to IndexNow"
