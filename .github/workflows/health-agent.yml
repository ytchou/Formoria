            done < <(jq -r '.human.traceability[].changedFiles[]' .health-agent-artifacts/human-metadata.json | sort -u)
          fi
          git diff --binary > .health-agent-artifacts/human.patch
      - name: Require human patch for claimed findings
        if: always() && steps.human-batch.outputs.has_findings == 'true'
        run: test -s .health-agent-artifacts/human.patch
      - name: Upload human repair result
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # pinned
        with:
          if-no-files-found: warn
          name: health-repair-human-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            .health-agent-artifacts/human.patch
            .health-agent-artifacts/human-cycle-*.json
            .health-agent-artifacts/human-review-*.json
          retention-days: 14

  escalate-repair-failure:
    needs: [gate, prepare-repair-batches, automatic-repair, human-repair]
    if: >-
      always() && needs.gate.outputs.autofix == 'true' &&
      needs.prepare-repair-batches.result == 'success' &&
      (needs.automatic-repair.result == 'failure' || needs.human-repair.result == 'failure')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      AGENT_HUB_INGEST_TOKEN: ${{ secrets.AGENT_HUB_INGEST_TOKEN }}
      AGENT_HUB_INGEST_URL: ${{ secrets.AGENT_HUB_INGEST_URL }}
      HEALTH_AGENT_WRITER_TOKEN: ${{ secrets.HEALTH_AGENT_WRITER_TOKEN }}
      LINEAR_ASSIGNEE_ID: ${{ vars.LINEAR_ASSIGNEE_ID }}
      LINEAR_OAUTH_ACCESS_TOKEN: ${{ secrets.LINEAR_OAUTH_ACCESS_TOKEN }}
      LINEAR_PROJECT_ID: ${{ vars.LINEAR_PROJECT_ID }}
      LINEAR_TEAM_ID: ${{ vars.LINEAR_TEAM_ID }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SLACK_HEALTH_WEBHOOK_URL: ${{ secrets.SLACK_HEALTH_WEBHOOK_URL }}
    steps:
      - name: Checkout failure reporter
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.30.1 --activate
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Download repair batch metadata
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: health-repair-batches-${{ github.run_id }}-${{ github.run_attempt }}
          path: .health-agent-artifacts
      - name: Escalate exhausted repair batches
        env:
          AUTOMATIC_RESULT: ${{ needs.automatic-repair.result }}
          HUMAN_RESULT: ${{ needs.human-repair.result }}
        run: |
          set -euo pipefail
          mkdir -p .health-agent-artifacts/failures
          run_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          lease_owner="github-actions:${GITHUB_RUN_ID}:${GITHUB_RUN_ATTEMPT}"
          if [[ "$AUTOMATIC_RESULT" == "failure" ]]; then
            pnpm exec tsx scripts/health-agent/workflow-runtime.ts repair-failure \
              --metadata .health-agent-artifacts/automatic-metadata.json \
              --snapshot .health-agent-artifacts/automatic-snapshot.json \
              --merge-policy automatic \
              --lease-owner "$lease_owner" \
              --run-at "$run_at" \
              --attempt "$GITHUB_RUN_ATTEMPT" \
              --run-id "$GITHUB_RUN_ID" \
              --output .health-agent-artifacts/failures/automatic.json
          fi
          if [[ "$HUMAN_RESULT" == "failure" ]]; then
            pnpm exec tsx scripts/health-agent/workflow-runtime.ts repair-failure \
              --metadata .health-agent-artifacts/human-metadata.json \
              --snapshot .health-agent-artifacts/human-snapshot.json \
              --merge-policy human \
              --lease-owner "$lease_owner" \
              --run-at "$run_at" \
              --attempt "$GITHUB_RUN_ATTEMPT" \
              --run-id "$GITHUB_RUN_ID" \
              --output .health-agent-artifacts/failures/human.json
          fi
      - name: Upload repair failure results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          if-no-files-found: warn
          name: health-repair-failures-${{ github.run_id }}-${{ github.run_attempt }}
          path: .health-agent-artifacts/failures/*.json
          retention-days: 14

  validate-repair:
    needs: [gate, automatic-repair, human-repair]
    if: >-
      always() && needs.gate.outputs.mutate == 'true' &&
      (needs.automatic-repair.result == 'success' || needs.human-repair.result == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout for secretless validation
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.30.1 --activate
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Download automatic patch
        if: needs.automatic-repair.result == 'success'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: health-repair-automatic-${{ github.run_id }}-${{ github.run_attempt }}
          path: .health-agent-artifacts/automatic
      - name: Download human patch
        if: needs.human-repair.result == 'success'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: health-repair-human-${{ github.run_id }}-${{ github.run_attempt }}
          path: .health-agent-artifacts/human
      - name: Download repair batch metadata
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: health-repair-batches-${{ github.run_id }}-${{ github.run_attempt }}
          path: .health-agent-artifacts/metadata
      - name: Validate snapshotted patches without credentials
        env:
          HEALTH_AGENT_MODE: ${{ needs.gate.outputs.mode }}
        run: |
          set -euo pipefail
          validator="$RUNNER_TEMP/validate-repair-patch.sh"
          cp scripts/health-agent/validate-repair-patch.sh "$validator"
          chmod 700 "$validator"
          validated=false
          for policy in automatic human; do
            patch=".health-agent-artifacts/$policy/$policy.patch"
            metadata=".health-agent-artifacts/metadata/$policy-metadata.json"
            finding_count="$(jq -er --arg policy "$policy" '.[$policy].finding_count | select(type == "number" and floor == . and . >= 0)' "$metadata")"
            if [[ "$finding_count" == "0" ]]; then
              test ! -s "$patch"
              continue
            fi
            test -s "$patch"
            git apply --check --index --binary "$patch"
            git apply --index --binary "$patch"
            "$validator" "$metadata" "$policy"
            git reset HEAD --
            if [[ "$HEALTH_AGENT_MODE" == "canary_fix" ]]; then
              test "$policy" = automatic
              scripts/health-agent/validate-canary-patch.sh \
                .health-agent-artifacts/metadata/automatic-snapshot.json
            fi
            pnpm lint
            pnpm exec tsc --noEmit --incremental false
            pnpm exec vitest run scripts/health-agent
            git apply --reverse --binary "$patch"
            validated=true
          done
          if [[ "$validated" != "true" ]]; then
            echo "No validated patch was produced"
            exit 0
          fi

  publish-automatic-pr:
    needs: [gate, automatic-repair, validate-repair]
    if: >-
      always() && needs.gate.outputs.autofix == 'true' &&
      needs.automatic-repair.result == 'success' && needs.validate-repair.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: read
    concurrency:
      group: formoria-agent-writer
      cancel-in-progress: false
    steps:
      - name: Create repository-scoped GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # pinned
        with:
          app-id: ${{ secrets.HEALTH_AGENT_GITHUB_APP_ID }}
          private-key: ${{ secrets.HEALTH_AGENT_GITHUB_APP_PRIVATE_KEY }}
          installation-id: ${{ secrets.HEALTH_AGENT_GITHUB_APP_INSTALLATION_ID }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
      - name: Checkout with GitHub App token
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          token: ${{ steps.app-token.outputs.token }}
      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.30.1 --activate
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Download automatic patch
        if: needs.automatic-repair.result == 'success'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: health-repair-automatic-${{ github.run_id }}-${{ github.run_attempt }}
          path: .health-agent-artifacts/automatic
      - name: Download automatic traceability metadata
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: health-repair-batches-${{ github.run_id }}-${{ github.run_attempt }}
          path: .health-agent-artifacts/metadata
      - name: Publish one automatic policy PR
        env:
          AGENT_HUB_INGEST_TOKEN: ${{ secrets.AGENT_HUB_INGEST_TOKEN }}
          AGENT_HUB_INGEST_URL: ${{ secrets.AGENT_HUB_INGEST_URL }}
          BATCH_KIND: automatic
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          HEALTH_AGENT_WRITER_TOKEN: ${{ secrets.HEALTH_AGENT_WRITER_TOKEN }}
          HEALTH_AGENT_MODE: ${{ needs.gate.outputs.mode }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SLACK_HEALTH_WEBHOOK_URL: ${{ secrets.SLACK_HEALTH_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          metadata_file=.health-agent-artifacts/metadata/automatic-metadata.json
          finding_count="$(jq -er '.automatic.finding_count | select(type == "number" and floor == . and . >= 0)' "$metadata_file")"
          if [[ "$finding_count" == "0" ]]; then
            test ! -s .health-agent-artifacts/automatic/automatic.patch
            echo "No automatic findings to publish"
            exit 0
          fi
          test -s .health-agent-artifacts/automatic/automatic.patch
          validator="$RUNNER_TEMP/validate-repair-patch.sh"
          cp scripts/health-agent/validate-repair-patch.sh "$validator"
          chmod 700 "$validator"
          git config user.name "formoria-health-agent[bot]"
          git config user.email "formoria-health-agent[bot]@users.noreply.github.com"
          gh label create health-agent --description "Formoria health-agent repair" --force
          pr_labels=(--label health-agent)
          if [[ "$HEALTH_AGENT_MODE" == "canary_fix" ]]; then
            gh label create health-agent-canary --description "Controlled health-agent App canary" --force
            pr_labels+=(--label health-agent-canary)
          fi
          git switch -C "health-agent/automatic-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" "$DEFAULT_BRANCH"
          git apply --index --binary .health-agent-artifacts/automatic/automatic.patch
          "$validator" "$metadata_file" automatic
          git reset HEAD --
          if [[ "$HEALTH_AGENT_MODE" == "canary_fix" ]]; then
            scripts/health-agent/validate-canary-patch.sh \
              .health-agent-artifacts/metadata/automatic-snapshot.json
          fi
          while IFS= read -r changed_path; do
            git add -A -- "$changed_path"
          done < <(jq -r '.automatic.traceability[].changedFiles[]' "$metadata_file" | sort -u)
          git commit -m "fix: apply automatic health repairs"
          git push --force-with-lease origin HEAD
          body_file=.health-agent-artifacts/automatic-pr-body.md
          {
            printf '%s\n\n' '<!-- health-agent:confirmation:v1 -->'
            printf '%s\n\n' 'Automatic health-repair batch. Traceability metadata:'
            printf '%s\n' '```json'
            cat "$metadata_file"
            printf '%s\n' '```'
          } > "$body_file"
          automatic_pr=$(gh pr create \
            --base "$DEFAULT_BRANCH" \
            --head "health-agent/automatic-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
            "${pr_labels[@]}" \
            --title "fix: automatic health repairs" \
            --body-file "$body_file")
          if [[ "$BATCH_KIND" == "automatic" ]]; then
            echo "auto_merge_enabled=true"
            gh pr merge --auto --squash "$automatic_pr"
          fi
          automatic_pr_number="${automatic_pr##*/}"
          pnpm exec tsx scripts/health-agent/workflow-runtime.ts repair-result \
            --metadata "$metadata_file" \
            --merge-policy automatic \
            --lease-owner "github-actions:${GITHUB_RUN_ID}:${GITHUB_RUN_ATTEMPT}" \
            --pr-number "$automatic_pr_number" \
            --pr-url "$automatic_pr" \
            --auto-merge-enabled true \
            --run-at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --attempt "$GITHUB_RUN_ATTEMPT" \
            --run-id "$GITHUB_RUN_ID" \
            --output .health-agent-artifacts/automatic-pr-result.json
      - name: Upload automatic PR result
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          if-no-files-found: warn
          name: health-pr-result-automatic-${{ github.run_id }}-${{ github.run_attempt }}
          path: .health-agent-artifacts/automatic-pr-result.json
          retention-days: 14

  publish-human-pr:
    needs: [gate, human-repair, validate-repair]
    if: >-
      always() && needs.gate.outputs.autofix == 'true' &&
      needs.human-repair.result == 'success' && needs.validate-repair.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
