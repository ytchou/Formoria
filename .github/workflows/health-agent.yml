      - name: Download human traceability metadata
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: health-repair-batches-${{ github.run_id }}-${{ github.run_attempt }}
