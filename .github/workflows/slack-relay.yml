name: Slack Relay

on:
  push:
    branches: [main]
    paths:
      - "slack-messages/*.json"

jobs:
  relay:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4

      - name: Send to Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_SENTRY_TRIAGE: ${{ secrets.SLACK_WEBHOOK_SENTRY_TRIAGE }}
          SLACK_WEBHOOK_DIRECTORY_HEALTH: ${{ secrets.SLACK_WEBHOOK_DIRECTORY_HEALTH }}
          SLACK_WEBHOOK_GROWTH_PULSE: ${{ secrets.SLACK_WEBHOOK_GROWTH_PULSE }}
        run: |
          sent=0
          failed=0
          for file in slack-messages/*.json; do
            [ -f "$file" ] || continue
            basename="${file##*/}"
            prefix="${basename%%-[0-9]*}"
            var_name="SLACK_WEBHOOK_$(echo "$prefix" | tr 'a-z-' 'A-Z_')"
            webhook_url="${!var_name:-$SLACK_WEBHOOK_URL}"
            echo "Routing $basename via $var_name"
            status=$(curl -s -o /dev/null -w '%{http_code}' \
              -X POST -H 'Content-type: application/json' \
              -d @"$file" "$webhook_url")
            if [ "$status" = "200" ]; then
              echo "Delivered: $file"
              rm "$file"
              sent=$((sent + 1))
            else
              echo "Failed ($status): $file"
              failed=$((failed + 1))
            fi
          done
          echo "Sent: $sent, Failed: $failed"
          [ "$failed" -eq 0 ] || exit 1

      - name: Cleanup delivered files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add slack-messages/
          git diff --staged --quiet || git commit -m "chore: cleanup delivered slack messages [skip ci]"
          git push
