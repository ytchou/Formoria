name: Content Sense

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

concurrency:
  group: content-sense
  cancel-in-progress: false

jobs:
  sense:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
    env:
      AGENT_HUB_SUPABASE_URL: ${{ secrets.AGENT_HUB_SUPABASE_URL }}
      AGENT_HUB_SUPABASE_SERVICE_KEY: ${{ secrets.AGENT_HUB_SUPABASE_SERVICE_KEY }}
      TODOIST_API_TOKEN: ${{ secrets.TODOIST_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: run-content-sensing
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          CLAUDE_PROMPT: |
            Read marketing/strategy/* and the content_items table for project 'formoria'.
            Env vars AGENT_HUB_SUPABASE_URL and AGENT_HUB_SUPABASE_SERVICE_KEY are set. Read/write content_items via the Supabase REST API with curl: GET "$AGENT_HUB_SUPABASE_URL/rest/v1/content_items?project=eq.formoria&select=id,title,item_path,status,platforms,target_date"; insert with POST to /rest/v1/content_items (Content-Type: application/json, Prefer: return=representation); always send headers apikey and Authorization: Bearer with the service key. Create Todoist tasks via POST https://api.todoist.com/rest/v2/tasks with Authorization: Bearer $TODOIST_API_TOKEN (skip silently if empty). Never print the secret values. Work autonomously; never ask questions.
            Identify 2-4 content opportunities. For each, create marketing/items/<date-slug>/brief.md with shared-contract frontmatter (item_id, status: proposed, platforms, target_date, lang). Do not create items that duplicate existing content_items rows.
        run: |
          npx @anthropic-ai/claude-code --print --dangerously-skip-permissions "$CLAUDE_PROMPT"

      - name: create-pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="content/sense-$(date +%Y%m%d)"
          git checkout -b "$BRANCH"
          git add marketing/items/
          if git diff --cached --quiet; then
            echo "No new items proposed"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "content(sense): propose new items $(date +%Y-%m-%d)"
          git push -u origin "$BRANCH"
          gh pr create --title "Content sense: $(date +%Y-%m-%d)" \
            --body "Auto-generated content proposals from weekly sensing." \
            --label "content"
