name: Frontend CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
    types: [opened, reopened]
  pull_request_review:
    branches: [main]
    types: [submitted, dismissed]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  quality_bundles:
    name: Quality / ${{ matrix.bundle }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        bundle: [lint, type-check, dead-code, unit-coverage, build]
    permissions:
      contents: read
    steps:
      - name: Check out pull request merge
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: ${{ github.event.pull_request.number && format('refs/pull/{0}/merge', github.event.pull_request.number) || github.sha }}
          persist-credentials: false
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Verify favicon is RGBA
        if: ${{ matrix.bundle == 'lint' }}
        run: node scripts/check-favicon-rgba.mjs
      - name: Lint
        if: ${{ matrix.bundle == 'lint' }}
        run: pnpm lint
      - name: Type-check
        if: ${{ matrix.bundle == 'type-check' }}
        run: pnpm tsc --noEmit
      - name: Dead code
        if: ${{ matrix.bundle == 'dead-code' }}
        run: pnpm knip
      - name: Unit coverage
        if: ${{ matrix.bundle == 'unit-coverage' }}
        run: pnpm test -- --coverage
      - name: Production build
        if: ${{ matrix.bundle == 'build' }}
        env:
          NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-public-anon-key
          SUPABASE_SERVICE_ROLE_KEY: ci-local-service-role-key
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: 1x00000000000000000000AA
          TURNSTILE_SECRET_KEY: 1x0000000000000000000000000000000AA
        run: pnpm build

  quality:
    name: Quality
    if: ${{ always() }}
    needs: [quality_bundles]
    runs-on: ubuntu-latest
    steps:
      - name: Report quality bundle status
        env:
          BUNDLE_RESULT: ${{ needs.quality_bundles.result }}
        run: |
          echo "Quality bundles: ${BUNDLE_RESULT}"
          if [[ "${BUNDLE_RESULT}" != "success" ]]; then
            exit 1
          fi

  change-policy:
    name: Change Policy
    if: ${{ github.event_name != 'push' && github.event_name != 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Collect authoritative pull request evidence
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('node:fs');
            const path = require('node:path');
            const pr = context.payload.pull_request;

            if (!pr || !Number.isInteger(pr.number) || !pr.head?.sha) {
              core.setFailed('Complete pull request context is required.');
              return;
            }

            const files = await github.paginate(
              github.rest.pulls.listFiles,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                per_page: 100,
              }
            );

            if (files.length >= 3000) {
              core.setFailed('The changed-file list reached GitHub\'s 3,000-file limit.');
              return;
            }

            const reviews = await github.paginate(
              github.rest.pulls.listReviews,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                per_page: 100,
              }
            );

            const evidence = {
              pullRequest: {
                number: pr.number,
                headSha: pr.head.sha,
              },
              files: files.map((file) => ({
                filename: file.filename,
                previousFilename: file.previous_filename,
                status: file.status,
                additions: file.additions,
                deletions: file.deletions,
                patch: file.patch,
              })),
              reviews: reviews.map((review) => ({
                state: review.state,
                commitId: review.commit_id,
                authorAssociation: review.author_association,
                user: review.user && {
                  login: review.user.login,
                  type: review.user.type,
                },
              })),
            };

            fs.writeFileSync(
              path.join(process.env.RUNNER_TEMP, 'change-policy-input.json'),
              JSON.stringify(evidence),
              { encoding: 'utf8', mode: 0o600 }
            );
      - name: Check out pull request merge
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          persist-credentials: false
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Enforce change policy
        run: pnpm tsx scripts/ci/change-policy.ts --input "$RUNNER_TEMP/change-policy-input.json"
