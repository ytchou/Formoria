name: Content Produce

on:
  schedule:
    - cron: '0 6 * * 1-5'
  workflow_dispatch:
    inputs:
      item_id:
        description: 'Specific item ID to produce (optional)'
        type: string
        default: ''

concurrency:
  group: content-produce
  cancel-in-progress: false

jobs:
  produce:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
      pull-requests: write
    env:
      AGENT_HUB_SUPABASE_URL: ${{ secrets.AGENT_HUB_SUPABASE_URL }}
      AGENT_HUB_SUPABASE_SERVICE_KEY: ${{ secrets.AGENT_HUB_SUPABASE_SERVICE_KEY }}
      TODOIST_API_TOKEN: ${{ secrets.TODOIST_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: fetch-approved-items
        id: fetch
        run: |
          ITEM_FILTER="${{ inputs.item_id }}"
          URL="${AGENT_HUB_SUPABASE_URL}/rest/v1/content_items?project=eq.formoria&status=eq.approved&select=id,title,item_path,platforms,target_date,notes"
          if [ -n "$ITEM_FILTER" ]; then
            URL="${URL}&id=eq.${ITEM_FILTER}"
          fi
          HTTP_STATUS=$(curl -sS -w '%{http_code}' -o items.json \
            -H "apikey: ${AGENT_HUB_SUPABASE_SERVICE_KEY}" \
            -H "Authorization: Bearer ${AGENT_HUB_SUPABASE_SERVICE_KEY}" \
            "$URL")
          if ! [[ "$HTTP_STATUS" =~ ^2 ]]; then
            echo "::error::Supabase fetch failed with HTTP $HTTP_STATUS"
            cat items.json
            exit 1
          fi
          HAS_ITEMS=$(jq 'length > 0' items.json)
          echo "has_items=${HAS_ITEMS}" >> "$GITHUB_OUTPUT"
          if [ "$HAS_ITEMS" = "false" ]; then
            echo "No approved items — nothing to produce"
          fi

      - name: produce-content
        if: steps.fetch.outputs.has_items == 'true'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          CLAUDE_PROMPT: |
            The approved content items are already fetched into items.json in the repo root (fields: id, title, item_path, platforms, target_date, notes). Do NOT attempt any database access. For each item: its folder is item_path; read <item_path>/brief.md; produce Threads and Instagram posts at <item_path>/post-threads.md and <item_path>/post-instagram.md following marketing/strategy/brand-voice.md; if the brief specifies media: carousel, render cards into <item_path>/cards/ using the templates in marketing/cards/. Work autonomously; never ask questions; if a brief is missing, skip that item and note it in the output.
        run: |
          npx @anthropic-ai/claude-code --print "$CLAUDE_PROMPT"

      - name: zh-TW-quality-gate
        if: steps.fetch.outputs.has_items == 'true'
        run: |
          if compgen -G "marketing/items/*/post-*.md" > /dev/null 2>&1; then
            python3 scripts/zh-check/check.py --channel social marketing/items/*/post-*.md
          else
            echo "::error::produce step wrote no post files"
            exit 1
          fi

      - name: create-pr
        if: steps.fetch.outputs.has_items == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="content/produce-$(date +%Y%m%d)"
          git checkout -b "$BRANCH"
          git add marketing/items/ marketing/cards/
          if git diff --cached --quiet; then
            echo "No content produced"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "content(produce): produce approved items $(date +%Y-%m-%d)"
          git push -u origin "$BRANCH"
          PR_URL=$(gh pr create --title "Content produce: $(date +%Y-%m-%d)" \
            --body "Auto-produced content from approved items." \
            --label "content")

          # Flip each produced item to status='review'
          while IFS= read -r ITEM_ID; do
            curl -sS -X PATCH \
              "${AGENT_HUB_SUPABASE_URL}/rest/v1/content_items?id=eq.${ITEM_ID}" \
              -H "apikey: ${AGENT_HUB_SUPABASE_SERVICE_KEY}" \
              -H "Authorization: Bearer ${AGENT_HUB_SUPABASE_SERVICE_KEY}" \
              -H "Content-Type: application/json" \
              -H "Prefer: return=minimal" \
              -d '{"status":"review"}'
          done < <(jq -r '.[].id' items.json)

          # Todoist review task — skip silently if token is unset
          if [ -n "$TODOIST_API_TOKEN" ]; then
            PRODUCE_DATE=$(date +%Y-%m-%d)
            curl -sS -X POST "https://api.todoist.com/rest/v2/tasks" \
              -H "Authorization: Bearer ${TODOIST_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"content\": \"Review produced content: ${PRODUCE_DATE}\", \"description\": \"${PR_URL}\"}"
          else
            echo "TODOIST_API_TOKEN not set — skipping notification"
          fi
